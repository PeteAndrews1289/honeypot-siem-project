<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Honeypot SOC evidence overview</title>
  <desc id="description">A dark dashboard summarizing 952,393 source-attributed events, 4,623 globally routable sources, 613 successful Cowrie logins, 457 Cowrie command inputs, service targeting, and ICS protocol counts.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081421"/>
      <stop offset="1" stop-color="#102b3f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="24" fill="url(#background)"/>
  <circle cx="1080" cy="90" r="170" fill="#2dd4bf" opacity="0.06"/>
  <circle cx="1120" cy="560" r="210" fill="#60a5fa" opacity="0.05"/>

  <text x="64" y="68" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">Honeypot SOC Evidence</text>
  <text x="64" y="100" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Cowrie + Conpot telemetry analyzed in Splunk · completed and decommissioned</text>
  <rect x="917" y="48" width="219" height="36" rx="18" fill="#134e4a"/>
  <text x="1026" y="72" text-anchor="middle" fill="#99f6e4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">SANITIZED EVIDENCE</text>

  <g filter="url(#shadow)">
    <rect x="64" y="136" width="252" height="126" rx="16" fill="#11283a" stroke="#29465c"/>
    <rect x="336" y="136" width="252" height="126" rx="16" fill="#11283a" stroke="#29465c"/>
    <rect x="608" y="136" width="252" height="126" rx="16" fill="#11283a" stroke="#29465c"/>
    <rect x="880" y="136" width="256" height="126" rx="16" fill="#11283a" stroke="#29465c"/>
  </g>
  <text x="88" y="176" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">SOURCE-ATTRIBUTED EVENTS</text>
  <text x="88" y="225" fill="#5eead4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="39" font-weight="700">952,393</text>
  <text x="360" y="176" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">GLOBAL SOURCE ADDRESSES</text>
  <text x="360" y="225" fill="#7dd3fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="39" font-weight="700">4,623</text>
  <text x="632" y="176" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">SUCCESSFUL COWRIE LOGINS</text>
  <text x="632" y="225" fill="#fbbf24" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="39" font-weight="700">613</text>
  <text x="904" y="176" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">COMMAND INPUT EVENTS</text>
  <text x="904" y="225" fill="#fda4af" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="39" font-weight="700">457</text>

  <g filter="url(#shadow)">
    <rect x="64" y="288" width="525" height="270" rx="16" fill="#11283a" stroke="#29465c"/>
    <rect x="611" y="288" width="525" height="270" rx="16" fill="#11283a" stroke="#29465c"/>
  </g>
  <text x="88" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Observed source coverage</text>
  <text x="88" y="356" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Same source value does not imply the same actor or campaign</text>
  <text x="88" y="400" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Cowrie only</text>
  <rect x="203" y="384" width="320" height="20" rx="10" fill="#1e3a4f"/>
  <rect x="203" y="384" width="320" height="20" rx="10" fill="#38bdf8"/>
  <text x="537" y="400" text-anchor="end" fill="#e0f2fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">4,358</text>
  <text x="88" y="448" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Conpot only</text>
  <rect x="203" y="432" width="320" height="20" rx="10" fill="#1e3a4f"/>
  <rect x="203" y="432" width="16" height="20" rx="10" fill="#2dd4bf"/>
  <text x="537" y="448" text-anchor="end" fill="#ccfbf1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">212</text>
  <text x="88" y="496" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Both services</text>
  <rect x="203" y="480" width="320" height="20" rx="10" fill="#1e3a4f"/>
  <rect x="203" y="480" width="8" height="20" rx="10" fill="#fbbf24"/>
  <text x="537" y="496" text-anchor="end" fill="#fef3c7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">54</text>

  <text x="635" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">ICS protocol interactions</text>
  <text x="635" y="356" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">721 records across the sanitized protocol export</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">
    <text x="635" y="400" fill="#cbd5e1">S7</text><rect x="710" y="385" width="346" height="18" rx="9" fill="#38bdf8"/><text x="1094" y="400" text-anchor="end" fill="#e0f2fe" font-weight="700">507</text>
    <text x="635" y="436" fill="#cbd5e1">Modbus</text><rect x="710" y="421" width="107" height="18" rx="9" fill="#2dd4bf"/><text x="1094" y="436" text-anchor="end" fill="#ccfbf1" font-weight="700">157</text>
    <text x="635" y="472" fill="#cbd5e1">COTP</text><rect x="710" y="457" width="19" height="18" rx="9" fill="#fbbf24"/><text x="1094" y="472" text-anchor="end" fill="#fef3c7" font-weight="700">28</text>
    <text x="635" y="508" fill="#cbd5e1">SNMP</text><rect x="710" y="493" width="8" height="18" rx="9" fill="#fda4af"/><text x="1094" y="508" text-anchor="end" fill="#ffe4e6" font-weight="700">12</text>
    <text x="635" y="544" fill="#cbd5e1">Other</text><rect x="710" y="529" width="12" height="18" rx="9" fill="#a78bfa"/><text x="1094" y="544" text-anchor="end" fill="#ede9fe" font-weight="700">17</text>
  </g>

  <text x="64" y="596" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Raw IPs, credentials, commands, payloads, session IDs, and host paths are intentionally excluded.</text>
</svg>
